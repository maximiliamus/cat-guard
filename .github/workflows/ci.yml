name: CI

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk xvfb libportaudio2 libsndfile1

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests (Linux — needs virtual display for pystray import)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pytest -m "not integration"

      - name: Run unit tests
        if: matrix.os != 'ubuntu-latest'
        run: pytest -m "not integration"
