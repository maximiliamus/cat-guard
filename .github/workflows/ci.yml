name: CI

on:
  push:
    branches:
      - master

concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: true

jobs:
  check-tag:
    name: Check for release tag
    runs-on: ubuntu-latest
    outputs:
      is_tagged: ${{ steps.tag_check.outputs.is_tagged }}
    steps:
      - name: Check if commit is tagged
        id: tag_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh api "repos/${{ github.repository }}/git/refs/tags" \
            --jq "[.[] | select(.object.sha == \"${{ github.sha }}\") | .ref] | length" 2>/dev/null || echo "0")
          echo "is_tagged=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

  test:
    name: Test (${{ matrix.os }})
    needs: check-tag
    if: needs.check-tag.outputs.is_tagged == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk xvfb libportaudio2 libsndfile1

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests (Linux — needs virtual display for pystray import)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pytest -m "not integration"

      - name: Run unit tests
        if: matrix.os != 'ubuntu-latest'
        run: pytest -m "not integration"
