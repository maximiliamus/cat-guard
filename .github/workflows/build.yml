name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            executable: catguard.exe
          - os: macos-latest
            platform: macos
            executable: catguard
          - os: ubuntu-latest
            platform: linux
            executable: catguard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk xvfb libportaudio2 libsndfile1

      - name: Install dependencies
        run: |
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install -e ".[dev]"

      - name: Run unit tests (Linux — needs virtual display for pystray import)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pytest -m "not integration"

      - name: Run unit tests
        if: matrix.os != 'ubuntu-latest'
        run: pytest -m "not integration"

      - name: Validate version matches tag (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          TOML_VERSION=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "Tag version:  $TAG_VERSION"
          echo "TOML version: $TOML_VERSION"
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi

      - name: Export ONNX model
        run: |
          pip install ultralytics
          python -c "from ultralytics import YOLO; YOLO('yolo11n.pt').export(format='onnx')"

      - name: Build with PyInstaller
        run: pyinstaller catguard.spec --clean --noconfirm

      - name: Verify build artifact exists and is non-zero
        shell: bash
        run: |
          EXEC="dist/catguard/${{ matrix.executable }}"
          if [ ! -f "$EXEC" ]; then
            echo "ERROR: Expected executable not found: $EXEC"
            exit 1
          fi
          SIZE=$(wc -c < "$EXEC")
          if [ "$SIZE" -eq 0 ]; then
            echo "ERROR: Executable is zero bytes: $EXEC"
            exit 1
          fi
          echo "Build artifact OK: $EXEC ($SIZE bytes)"

      - name: Get tag version (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ARCHIVE_NAME="catguard-${{ steps.version.outputs.version }}-${{ matrix.platform }}"
          else
            ARCHIVE_NAME="catguard-${{ matrix.platform }}"
          fi
          python -c "
          import shutil, pathlib
          pathlib.Path('artifacts').mkdir(exist_ok=True)
          shutil.make_archive('artifacts/${ARCHIVE_NAME}', 'zip', 'dist', 'catguard')
          print('Packaged: artifacts/${ARCHIVE_NAME}.zip')
          "

      - name: Upload artifact (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: catguard-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: artifacts/*.zip
          retention-days: 7

      - name: Upload artifact (CI builds)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: catguard-${{ matrix.platform }}
          path: artifacts/*.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
